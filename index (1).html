<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPEED BIKER POS</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  font-family: Arial;
  background:#111;
  color:white;
  margin:0;
}
header{
  background:#e10600;
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}
.container{
  padding:15px;
}
button{
  width:100%;
  padding:15px;
  font-size:18px;
  border:none;
  border-radius:5px;
  margin-top:10px;
  font-weight:bold;
}
.btn-scan{ background:#00c853; color:white; }
#reader{
  margin-top:15px;
}
</style>
</head>

<body>

<header>
SPEED BIKER Moto Accesorios
</header>

<div class="container">

<button class="btn-scan" onclick="startScanner()">Escanear Código</button>

<div id="reader"></div>

<p id="result"></p>

</div>

<script>
function startScanner(){
  const html5QrCode = new Html5Qrcode("reader");

  html5QrCode.start(
    { facingMode: "environment" },
    {
      fps: 10,
      qrbox: 250
    },
    (decodedText) => {
      document.getElementById("result").innerHTML = 
        "Código detectado: " + decodedText;

      html5QrCode.stop();
    },
    (errorMessage) => {
      // Ignorar errores de escaneo
    }
  ).catch((err) => {
    alert("Error al iniciar cámara");
  });
}
</script>

</body>
</html>
